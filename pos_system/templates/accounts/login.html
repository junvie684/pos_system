{% extends 'base.html' %}
{% block content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; margin:-28px -32px;">
  <div style="width:100%; max-width:380px; padding:20px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="font-family:'Syne',sans-serif; font-size:32px; font-weight:700; color:#10b981; margin-bottom:6px;">&#9632; POS</div>
      <div style="color:#475569; font-size:14px;">Sign in to your account</div>
    </div>
    <div class="card">
      {% if form.non_field_errors %}
      <div class="alert alert-error" style="margin-bottom:16px">
        <i class="bi bi-x-circle"></i>
        {{ form.non_field_errors|join:", " }}
      </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          <input class="form-control" type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" {% if field.value %}value="{{ field.value }}"{% endif %} autocomplete="off">
          {% if field.errors %}<div style="color:#f87171; font-size:12px; margin-top:4px;">{{ field.errors|join:", " }}</div>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:11px; font-size:14px; margin-top:6px;">
          <i class="bi bi-arrow-right-circle"></i> Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
