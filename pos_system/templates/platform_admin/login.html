<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Platform Admin — Login</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root {
      --navy:   #0f1623;
      --navy2:  #161e2e;
      --navy3:  #1e293b;
      --accent: #10b981;
      --accent2:#059669;
      --danger: #ef4444;
      --text:   #f1f5f9;
      --text2:  #94a3b8;
      --text3:  #475569;
      --border: rgba(255,255,255,0.07);
      --card:   #1a2234;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .badge-admin {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-size: 15px;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
      outline: none;
    }

    .sign-in-title {
      color: #ffffff;
      font-weight: 700;
    }

    /* Green Sign In Button */
    .btn-primary {
      background: var(--accent);
      color: #ffffff;
      border: none;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
    }

    /* White bottom text */
    .store-login-text {
      color: #ffffff !important;
    }

    .alert {
      border-radius: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="text-center mb-4">
        <span class="badge-admin">PLATFORM ADMIN</span>
        <h4 class="mt-3 mb-1 sign-in-title">POS</h4>
      </div>

      {% if form.non_field_errors %}
        <div class="alert alert-danger py-3 small">
          {{ form.non_field_errors.0 }}
        </div>
      {% endif %}

      <form method="post" novalidate>
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control"
                 value="{{ form.username.value|default:'' }}"
                 autofocus autocomplete="username">
          {% if form.username.errors %}
            <div class="text-danger small mt-1">{{ form.username.errors.0 }}</div>
          {% endif %}
        </div>

        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 autocomplete="current-password">
          {% if form.password.errors %}
            <div class="text-danger small mt-1">{{ form.password.errors.0 }}</div>
          {% endif %}
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Sign In
        </button>
      </form>

      <p class="text-center small mt-4 mb-0 store-login-text">
        Store login? <a href="/accounts/login/" class="text-decoration-none">Go here</a>
      </p>
    </div>
  </div>
</body>
</html>
