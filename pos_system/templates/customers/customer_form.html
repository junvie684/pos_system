{% extends 'base.html' %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div style="max-width:520px;">
  <div class="card">
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
        <input class="form-control" type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" id="{{ field.id_for_label }}" {% if field.value %}value="{{ field.value }}"{% endif %}>
        {% if field.errors %}<div style="color:#f87171; font-size:12px; margin-top:4px;">{{ field.errors|join:", " }}</div>{% endif %}
      </div>
      {% endfor %}
      <div style="display:flex; gap:10px; margin-top:6px;">
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save Customer</button>
        <a href="{% url 'customers:customer_list' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
